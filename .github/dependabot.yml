version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - glatztp
    assignees:
      - glatztp
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    reviewers:
      - glatztp
    assignees:
      - glatztp
    labels:
      - dependencies
      - dependabot
