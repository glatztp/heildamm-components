name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version type (major, minor, patch)
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: git config user.name "github-actions[bot]"
      - run: git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build:lib

      - name: Version bump
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          pnpm version ${{ github.event.inputs.version }} --no-git-tag-version
          NEW_VERSION=$(jq -r '.version' package.json)
          git add package.json pnpm-lock.yaml
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --follow-tags

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org/

      - run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${pkg.version}`,
              name: `Release v${pkg.version}`,
              body: `Published to npm: [@heildamm/components@${pkg.version}](https://www.npmjs.com/package/@heildamm/components/v/${pkg.version})`,
              draft: false,
              prerelease: false
            });
